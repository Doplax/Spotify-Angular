<div class="side-bar">

  <!-- Head Section -->
  <section class="head-section">
    <div class="top-section">
      <div class="flex flex-row items-center">
        <shared-svg-library class="g-icon" />
        <span>Tu Biblioteca</span>
      </div>
      <div class="flex flex-row">
        <mat-icon>add</mat-icon>
        <mat-icon>arrow_forward</mat-icon>
      </div>
    </div>
  </section>

  <!-- Filter chip -->
  <section class="g-chip-section">
    <span class="g-chip-btn">Listas</span>
  </section>

  <!-- Search + sort -->
  <section class="search-section">
    <shared-svg-search class="search-icon"/>
    <div class="recents-lists">
      <span>Recientes</span>
      <mat-icon>format_list_bulleted</mat-icon>
    </div>
  </section>

  <!-- Playlists -->
  <section class="recents-list-section">
    @for (playlist of playlists; track playlist.id) {
      <div class="playList-card g-hover-grey" (click)="navigateTo(playlist)">

        <!-- Colored cover instead of folder icon -->
        <div class="playList-image" [style.background-color]="playlist.color">
          <span class="playlist-emoji">🎵</span>
        </div>

        <div class="playList-info">
          <span class="title">{{ playlist.title }}</span>
          <span class="subTitle">Playlist · {{ playlist.limit }} canciones</span>
        </div>

        <div class="playList-icon">
          <button class="sidebar-play-btn" (click)="playPlaylist($event, playlist)" title="Reproducir">
            <mat-icon>play_arrow</mat-icon>
          </button>
        </div>

      </div>
    }
  </section>

</div>
