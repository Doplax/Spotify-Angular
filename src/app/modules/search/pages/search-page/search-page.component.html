<div class="history-page g-page-container">
  @if (isLoading) {
    <div class="loading-container">
      <span>Buscando...</span>
    </div>
  } @else if (tracks.length === 0 && searchTerm) {
    <div class="empty-container">
      <span>No se encontraron resultados para "{{ searchTerm }}"</span>
    </div>
  } @else if (tracks.length > 0) {
    <div class="main-container">
      <!-- Top result -->
      @if (topTrack) {
        <div class="artist-container">
          <span class="title-section">Resultado principal</span>
          <search-artist-card [artistData]="topTrack" />
        </div>
      }

      <!-- Tracks list -->
      <div class="tracks-container">
        <span class="title-section">Canciones</span>
        @for (track of tracks; track track._id) {
          <search-track [trackData]="track" />
        }
      </div>
    </div>
  }

  <shared-footer />
</div>
