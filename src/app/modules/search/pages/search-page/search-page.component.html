<div class="history-page g-page-container">
  @if (isLoading) {
    <div class="loading-container">
      <span>Buscando...</span>
    </div>
  } @else if (tracks.length === 0 && searchTerm) {
    <div class="empty-container">
      <span>No se encontraron resultados para "{{ searchTerm }}"</span>
    </div>
  } @else if (tracks.length > 0) {
    <div class="main-container">

      <!-- TOP: artist card full width -->
      @if (topTrack) {
        <div class="top-section">
          <search-artist-card [firstTrack]="topTrack" />
        </div>
      }

      <!-- BOTTOM: scrollable tracks list -->
      <div class="bottom-section">
        <span class="title-section">Canciones</span>
        <div class="tracks-scroll">
          @for (track of tracks; track track._id) {
            <search-track [trackData]="track" />
          }
        </div>
      </div>

    </div>
  }

  <shared-footer />
</div>
