<div class="track-row" (click)="play()">
  <!-- Cover and play icon -->
  <div class="track-cover">
    <img
      [src]="coverUrl"
      [alt]="trackTitle"
      width="56"
      height="56"
      style="border-radius:8px;"
    />
    <span class="play-icon">&#9654;</span>
  </div>

  <!-- Main info -->
  <div class="track-main">
    <span class="track-title">{{ trackTitle }}</span>
    <div class="track-meta">
      <span class="track-artists">{{ subtitles }}</span>
    </div>
  </div>

  <!-- Actions and duration -->
  <div class="track-actions">
    <button class="add-btn" title="Add to playlist" (click)="$event.stopPropagation()">+</button>
    <button class="more-btn" title="More options" (click)="$event.stopPropagation()">&#8942;</button>
  </div>
</div>
